<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miso Modern Global — The Green Steps</title>
  <meta name="description" content="The Green Steps — a series about presence, not perfection. Exhibition coming soon from Miso Modern Global." />
  <meta property="og:title" content="Miso Modern Global — The Green Steps" />
  <meta property="og:description" content="A series about presence, not perfection. Same place. Different truth. Exhibition coming soon." />
  <meta property="og:image" content="miso-modern-splash.jpg" />
  <meta property="og:type" content="website" />
  <link rel="preload" as="image" href="miso-modern-splash.jpg" media="(min-width: 701px)" />
  <link rel="preload" as="image" href="miso-modern-mobile-splash.jpg" media="(max-width: 700px)" />
  <link rel="preload" as="image" href="miso-modern-global-logo.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #0a0d0a;
      font-family: "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .hero {
      position: relative;
      display: grid;
      place-items: center;
      width: 100vw;
      min-height: 100vh;
      min-height: 100svh;
      isolation: isolate;
      overflow: hidden;
      background-image: url("miso-modern-splash.jpg");
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.18) 62%, rgba(0, 0, 0, 0.42));
      pointer-events: none;
    }

    .lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transform: translateY(-6vh);
    }

    .logo {
      display: block;
      width: clamp(150px, min(23vw, 27vh), 320px);
      height: auto;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.48));
    }

    .contact {
      margin-top: clamp(10px, 1.4vw, 18px);
      color: #f3f1ea;
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 600;
      letter-spacing: 0.22em;
      line-height: 1.8;
      text-transform: uppercase;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    .contact a {
      color: inherit;
      text-decoration: none;
    }

    .contact a:hover,
    .contact a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .mailing-list {
      display: inline-block;
      margin-top: clamp(14px, 1.8vw, 24px);
      padding: 0.7em 1.6em;
      border: 1px solid rgba(243, 241, 234, 0.85);
      background: rgba(10, 13, 10, 0.35);
      color: #f3f1ea;
      font-family: inherit;
      font-size: clamp(10px, 0.95vw, 12px);
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .mailing-list:hover,
    .mailing-list:focus-visible {
      background: #f3f1ea;
      color: #0a0d0a;
    }

    @media (max-width: 700px) {
      .hero {
        background-image: url("miso-modern-mobile-splash.jpg");
        background-position: center;
      }

      .lockup {
        transform: translateY(-7vh);
      }

      .logo {
        width: clamp(130px, 38vw, 200px);
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Miso Modern Global — The Green Steps exhibition coming soon">
    <div class="lockup">
      <img class="logo" src="miso-modern-global-logo.png" alt="Miso Modern Global" />
      <p class="contact">
        For more information<br />
        contact<br />
        <a href="mailto:sweva@misomodern.com">sweva@misomodern.com</a>
      </p>
      <a class="mailing-list" href="mailto:sweva@misomodern.com?subject=Join%20the%20mailing%20list">Join the mailing list</a>
    </div>
  </main>
</body>
</html>
