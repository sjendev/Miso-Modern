<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miso Modern Global — The Green Steps</title>
  <meta name="description" content="The Green Steps — a series about presence, not perfection. Exhibition coming soon from Miso Modern Global." />
  <meta property="og:title" content="Miso Modern Global — The Green Steps" />
  <meta property="og:description" content="A series about presence, not perfection. Same place. Different truth. Exhibition coming soon." />
  <meta property="og:image" content="miso-modern-splash.jpg" />
  <meta property="og:type" content="website" />
  <link rel="preload" as="image" href="miso-modern-splash.jpg" media="(min-width: 701px)" />
  <link rel="preload" as="image" href="miso-modern-mobile-splash.jpg" media="(max-width: 700px)" />
  <link rel="preload" as="image" href="miso-modern-global-logo.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #0a0d0a;
      font-family: "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .hero {
      position: relative;
      display: grid;
      place-items: center;
      width: 100vw;
      min-height: 100vh;
      min-height: 100svh;
      isolation: isolate;
      overflow: hidden;
      background-image: url("miso-modern-splash.jpg");
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.18) 62%, rgba(0, 0, 0, 0.42));
      pointer-events: none;
    }

    .lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transform: translateY(-6vh);
    }

    .logo {
      display: block;
      width: clamp(150px, min(23vw, 27vh), 320px);
      height: auto;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.48));
    }

    .contact {
      margin-top: clamp(10px, 1.4vw, 18px);
      color: #f3f1ea;
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 600;
      letter-spacing: 0.22em;
      line-height: 1.8;
      text-transform: uppercase;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    .contact a {
      color: inherit;
      text-decoration: none;
    }

    .contact a:hover,
    .contact a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .mailing-list {
      display: inline-block;
      margin-top: clamp(14px, 1.8vw, 24px);
      padding: 0.7em 1.6em;
      border: 1px solid rgba(243, 241, 234, 0.85);
      background: rgba(10, 13, 10, 0.35);
      color: #f3f1ea;
      font-family: inherit;
      font-size: clamp(10px, 0.95vw, 12px);
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .mailing-list:hover,
    .mailing-list:focus-visible {
      background: #f3f1ea;
      color: #0a0d0a;
    }

    button.mailing-list {
      cursor: pointer;
    }

    .signup {
      position: fixed;
      inset: 0;
      margin: auto;
      height: fit-content;
      width: min(92vw, 440px);
      padding: clamp(30px, 4vw, 46px) clamp(22px, 4vw, 48px);
      border: 1px solid rgba(243, 241, 234, 0.85);
      background: rgba(10, 13, 10, 0.97);
      color: #f3f1ea;
      text-align: center;
    }

    .signup::backdrop {
      background: rgba(4, 6, 4, 0.65);
      backdrop-filter: blur(3px);
    }

    .signup-close {
      position: absolute;
      top: 10px;
      right: 14px;
      border: 0;
      background: none;
      color: rgba(243, 241, 234, 0.7);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .signup-close:hover,
    .signup-close:focus-visible {
      color: #f3f1ea;
    }

    .signup h2 {
      font-size: clamp(15px, 1.4vw, 19px);
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    .signup-sub {
      margin-top: 14px;
      font-size: clamp(10px, 1vw, 12px);
      font-weight: 600;
      letter-spacing: 0.18em;
      line-height: 1.9;
      text-transform: uppercase;
      color: rgba(243, 241, 234, 0.8);
    }

    .signup form {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .gotcha {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .signup-email {
      padding: 0.9em 1em;
      border: 1px solid rgba(243, 241, 234, 0.55);
      background: transparent;
      color: #f3f1ea;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-align: center;
      text-transform: uppercase;
    }

    .signup-email::placeholder {
      color: rgba(243, 241, 234, 0.45);
    }

    .signup-email:focus {
      outline: 1px solid #f3f1ea;
      outline-offset: 1px;
    }

    .signup-submit {
      padding: 0.9em 1em;
      border: 1px solid rgba(243, 241, 234, 0.85);
      background: #f3f1ea;
      color: #0a0d0a;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .signup-submit:hover,
    .signup-submit:focus-visible {
      background: transparent;
      color: #f3f1ea;
    }

    .signup-submit:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .signup-status {
      margin-top: 16px;
      min-height: 1.2em;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      line-height: 1.8;
      text-transform: uppercase;
    }

    .signup-status:empty {
      margin-top: 0;
      min-height: 0;
    }

    @media (max-width: 700px) {
      .hero {
        background-image: url("miso-modern-mobile-splash.jpg");
        background-position: center;
      }

      .lockup {
        transform: translateY(-3.5vh);
      }

      .logo {
        width: clamp(90px, min(26vw, 18vh), 150px);
      }

      .contact {
        margin-top: 10px;
        line-height: 1.6;
      }

      .mailing-list {
        margin-top: 12px;
        padding: 0.6em 1.4em;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Miso Modern Global — The Green Steps exhibition coming soon">
    <div class="lockup">
      <img class="logo" src="miso-modern-global-logo.png" alt="Miso Modern Global" />
      <p class="contact">
        For more information<br />
        contact<br />
        <a href="mailto:artists@misomodern.com">artists@misomodern.com</a>
      </p>
      <button class="mailing-list" type="button" id="open-signup">Join the mailing list</button>
    </div>
  </main>

  <dialog class="signup" id="signup" aria-labelledby="signup-title">
    <button class="signup-close" type="button" aria-label="Close">&times;</button>
    <h2 id="signup-title">Join the mailing list</h2>
    <p class="signup-sub">Be the first to hear about The Green Steps &mdash; exhibition dates, previews, and prints.</p>
    <form id="signup-form" novalidate>
      <input class="gotcha" type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" />
      <input class="signup-email" type="email" name="email" required placeholder="Your email" autocomplete="email" aria-label="Email address" />
      <button class="signup-submit" type="submit">Subscribe</button>
    </form>
    <p class="signup-status" role="status" aria-live="polite"></p>
  </dialog>

  <script>
    var FORM_ENDPOINT = "https://formspree.io/f/mpqejdee";

    var dialog = document.getElementById("signup");
    var form = document.getElementById("signup-form");
    var emailInput = form.querySelector(".signup-email");
    var submitBtn = form.querySelector(".signup-submit");
    var statusEl = dialog.querySelector(".signup-status");

    function openSignup() {
      if (!dialog.open) {
        dialog.showModal();
        emailInput.focus();
      }
    }

    document.getElementById("open-signup").addEventListener("click", openSignup);
    dialog.querySelector(".signup-close").addEventListener("click", function () { dialog.close(); });
    dialog.addEventListener("click", function (e) {
      if (e.target === dialog) dialog.close();
    });
    dialog.addEventListener("close", function () {
      try { localStorage.setItem("misoSignupSeen", "1"); } catch (e) {}
    });

    var seen = false;
    try {
      seen = localStorage.getItem("misoSignupSeen") || localStorage.getItem("misoSubscribed");
    } catch (e) {}
    if (!seen) setTimeout(openSignup, 4000);

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (!emailInput.checkValidity()) {
        statusEl.textContent = "Please enter a valid email address.";
        emailInput.focus();
        return;
      }
      statusEl.textContent = "Sending…";
      submitBtn.disabled = true;
      fetch(FORM_ENDPOINT, {
        method: "POST",
        body: new FormData(form),
        headers: { Accept: "application/json" }
      })
        .then(function (res) {
          if (!res.ok) throw new Error("bad status");
          form.hidden = true;
          statusEl.textContent = "Thank you — you're on the list.";
          try { localStorage.setItem("misoSubscribed", "1"); } catch (e) {}
        })
        .catch(function () {
          submitBtn.disabled = false;
          statusEl.textContent = "Something went wrong — please email artists@misomodern.com";
        });
    });
  </script>
</body>
</html>
